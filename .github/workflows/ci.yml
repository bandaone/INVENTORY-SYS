name: Retail OS CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ─────────────────────────────────────────────
  # CI JOB: Build & Validate all 3 apps
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: |
          dashboard/package-lock.json

    # ── 1. Dashboard (Next.js) ──
    - name: Install Dashboard Dependencies
      working-directory: ./dashboard
      run: npm ci

    - name: Build Dashboard
      working-directory: ./dashboard
      run: npm run build
      env:
        # Provide a dummy DB URL so Next.js doesn't crash during static analysis
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/retail_os_dev"
        APP_DATABASE_URL: "postgresql://postgres:password@localhost:5432/retail_os_dev"
        NEXT_PUBLIC_SENTRY_DSN: "https://dummy@o0.ingest.sentry.io/0"
        NEXT_TELEMETRY_DISABLED: 1

  # ─────────────────────────────────────────────
  # CD JOB: Deploy to Vercel (only on main, after CI passes)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build-and-test        # ← Blocks deploy if CI fails
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install Vercel CLI
      run: npm install -g vercel@latest

    - name: Deploy to Vercel Production
      working-directory: ./dashboard
      run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
